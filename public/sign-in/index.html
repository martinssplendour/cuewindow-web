<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in | CueWindow</title>
    <link rel="icon" href="/assets/brand/cuewindow-favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="site-brand" href="/"><img src="/assets/brand/cuewindow-logo-mark.svg" alt="" /><span>CueWindow</span></a>
      <nav class="site-nav" aria-label="Main navigation"><a href="/download/">Download</a><a href="/privacy/">Privacy</a><a href="/support/">Support</a></nav>
      <div class="site-actions"><a class="button-outline" href="/sign-up/">Sign up</a></div>
    </header>
    <main class="page-shell">
      <section class="auth-layout">
        <div class="page-hero">
          <p class="eyebrow">Account</p>
          <h1>Welcome back.</h1>
          <p>Sign in to manage downloads and your CueWindow account.</p>
        </div>
        <article class="auth-card">
          <h1>Sign in</h1>
          <p>Use the same account in the website and desktop app.</p>
          <form class="form" data-sign-in-form>
            <label>Email address <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required /></label>
            <label>Password <input name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required /></label>
            <div class="form-row"><span></span><a class="inline-link" href="/reset-password/">Forgot password?</a></div>
            <button class="button" type="submit">Sign in</button>
            <p>Don't have an account? <a class="inline-link" href="/sign-up/">Sign up</a></p>
          </form>
          <div class="notice" id="siteNotice" hidden></div>
        </article>
      </section>
    </main>
    <script src="/config.js"></script>
    <script src="/site.js"></script>
  </body>
</html>
