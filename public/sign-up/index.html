<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create account | CueWindow</title>
    <link rel="icon" href="/assets/brand/cuewindow-favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="site-brand" href="/"><img src="/assets/brand/cuewindow-logo-mark.svg" alt="" /><span>CueWindow</span></a>
      <nav class="site-nav" aria-label="Main navigation"><a href="/download/">Download</a><a href="/privacy/">Privacy</a><a href="/support/">Support</a></nav>
      <div class="site-actions"><a class="button-outline" href="/sign-in/">Sign in</a></div>
    </header>
    <main class="page-shell">
      <section class="auth-layout">
        <div class="page-hero">
          <p class="eyebrow">Create account</p>
          <h1>Start with one profile.</h1>
          <p>Create your CueWindow account, then build interview and meeting profiles from the app.</p>
        </div>
        <article class="auth-card">
          <h1>Sign up</h1>
          <p>Your account keeps profiles, conversations, and files separated by user.</p>
          <form class="form" data-sign-up-form>
            <label>Name <input name="name" type="text" autocomplete="name" placeholder="Alex Morgan" required /></label>
            <label>Email address <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required /></label>
            <label>Password <div class="password-field"><input name="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" required /><button type="button" class="password-toggle" data-toggle-password aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></label>
            <label>Confirm password <div class="password-field"><input name="confirmPassword" type="password" autocomplete="new-password" placeholder="Repeat your password" required /><button type="button" class="password-toggle" data-toggle-password aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></label>
            <button class="button" type="submit">Create account</button>
            <p>Already have an account? <a class="inline-link" href="/sign-in/">Sign in</a></p>
          </form>
          <div class="auth-divider"><span>or</span></div>
          <button type="button" class="button-google" data-google-signin><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google</button>
          <div class="notice" id="siteNotice" hidden></div>
        </article>
      </section>
    </main>
    <script src="/config.js"></script>
    <script src="/site.js"></script>
  </body>
</html>
