<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password | CueWindow</title>
    <link rel="icon" href="/assets/brand/cuewindow-favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="site-brand" href="/"><img src="/assets/brand/cuewindow-logo-mark.svg" alt="" /><span>CueWindow</span></a>
      <nav class="site-nav" aria-label="Main navigation"><a href="/download/">Download</a><a href="/privacy/">Privacy</a><a href="/support/">Support</a></nav>
      <div class="site-actions"><a class="button-outline" href="/sign-in/">Sign in</a></div>
    </header>
    <main class="page-shell">
      <section class="auth-layout">
        <div class="page-hero">
          <p class="eyebrow">Account recovery</p>
          <h1>Reset your password.</h1>
          <p>Request a secure reset email, then use the recovery link to set a new password.</p>
        </div>
        <article class="auth-card">
          <form class="form" id="resetRequestForm" data-reset-request-form>
            <h1>Send reset email</h1>
            <label>Email address <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required /></label>
            <button class="button" type="submit">Send reset link</button>
            <p>Remembered your password? <a class="inline-link" href="/sign-in/">Sign in</a></p>
          </form>
          <form class="form is-hidden" id="newPasswordForm" data-new-password-form>
            <h1>Set new password</h1>
            <label>New password <input name="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" required /></label>
            <label>Confirm password <input name="confirmPassword" type="password" autocomplete="new-password" placeholder="Repeat your password" required /></label>
            <button class="button" type="submit">Update password</button>
          </form>
          <div class="notice" id="siteNotice" hidden></div>
        </article>
      </section>
    </main>
    <script src="/config.js"></script>
    <script src="/site.js"></script>
  </body>
</html>
